<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/welcome.css">
        <link rel="stylesheet" href="/css/register.css">
        <link rel="stylesheet" href="/include/navbar.css">
        <link rel="stylesheet" href="/include/footer.css">
    </head>
<body>

<div id="navCont"></div>

<div class="welcome mt-5">
    <div class="container-sm">
    <div class="mx-auto" style="max-width: 500px;">   
    <h1 style="margin-bottom: 10%;">Register</h1>
    <form id="reg_form" action="/register" method="post">
    <input name="firstName" class="form-control form-control-lg" type="text" placeholder="first name" required>
    <input name="lastName" class="form-control form-control-lg" type="text" placeholder="last name" required>
    <input name="email" class="form-control form-control-lg" type="email" placeholder="e-mail" required>
    <input name="confirm_email" class="form-control form-control-lg" type="email" placeholder="confirm e-mail" required>
    <input name="password" class="form-control form-control-lg" type="password" placeholder="password" required>
    <input name="confirm_password" class="form-control form-control-lg" type="password" placeholder="confirm password" required>
    <button id="register_button" class="form-control form-control-lg" type="submit">register</button>
    </form>
    </div>
</div>
</div>

<script src="/include/navbar.js"></script>
<script src="/include/footer.js"></script>
<script src="/js/testFetch.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
