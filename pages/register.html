<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/welcome.css">
        <link rel="stylesheet" href="/css/register.css">
        <link rel="stylesheet" href="/include/navbar.css">
        <link rel="stylesheet" href="/include/footer.css">
    </head>
<body>

<div id="navCont"></div>

<main class="d-flex justify-content-center align-items-center register-main">
    <div class="register-card shadow-sm rounded-4 p-4 p-md-5">

        <div class="text-center mb-4">
            <img src="/img/logo-png-transparent-smaller.png" alt="NutriPaw Logo" class="register-logo mb-2">
            <h1 class="register-title">Register</h1>
        </div>

        <div id="register-alert" class="alert alert-danger d-none" role="alert"></div>
        <div id="success-alert" class="alert alert-success d-none" role="alert"></div>

        <form id="reg_form" action="/register" method="post">
             <div class="mb-3">
                <label for="firstName" class="form-label fw-semibold">First name</label>
                <input name="firstName" type="text" class="form-control"  placeholder="first name" required>
            </div>
             <div class="mb-3">
                <label for="lastName" class="form-label fw-semibold">Last name</label>
                <input name="lastName" type="text" class="form-control" placeholder="last name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email address</label>
                <input name="email" type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Confirm Email address</label>
                <input name="confirm_email" type="email" class="form-control" placeholder="confirm e-mail" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input name="password" type="password" class="form-control" placeholder="Enter password with at least 8 characters" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                <input name="confirm_password" type="password" class="form-control" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn btn-tan w-100 py-2 fw-bold" id="register_button">
                register
            </button>
         </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
            Sign in?
            <a href="/pages/login.html" class="register-link fw-semibold">Back to login</a>
        </p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>





<script src="/include/navbar.js"></script>
<script src="/include/footer.js"></script>
<script src="/js/testFetch.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
