<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPaw - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div id="navCont"></div>

<main class="d-flex justify-content-center align-items-center login-main">
    <div class="login-card shadow-sm rounded-4 p-4 p-md-5">

        <div class="text-center mb-4">
            <img src="/img/logo-png-transparent-smaller.png" alt="NutriPaw Logo" class="login-logo mb-2">
            <h1 class="login-title"><ul class="list-group">
                <a class="list-group-item list-group-item-action active" href="#">Text</a>
                <a class="list-group-item list-group-item-action disabled" href="#" tabindex="-1" aria-disabled="true">Disabled item</a>
            </ul></h1>
        </div>

        <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">E-Mail-Adresse</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required autocomplete="email">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Passwort</label>
                <input type="password" class="form-control" id="password" placeholder="Passwort eingeben" required autocomplete="current-password">
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted small" for="rememberMe">Angemeldet bleiben</label>
                </div>
                <a href="#" class="text-muted small login-link">Passwort vergessen?</a>
            </div>

            <button type="submit" class="btn btn-tan w-100 py-2 fw-bold" id="login-btn">
                Login
            </button>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="/pages/register.html" class="login-link fw-semibold">Register now!</a>
        </p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/include/navbar.js"></script>
<script src="/include/footer.js"></script>
<script type="module" src="/js/login.js"></script>
</body>
</html>
