<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pet Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/editPetProfile.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body class="bg-light">
    <div id="navCont"></div>

    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body p-4">
                <h2 class="card-title mb-4 pb-2 border-bottom">Edit Pet Profile</h2>
                
                <div id="error-message" class="alert alert-danger d-none fw-bold">
                    You do not have permission to edit this profile.
                </div>
                
                <form id="edit-pet-form">
                    <input type="hidden" id="pet_id" name="pet_id">
                    
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Pet Name:</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="species" class="form-label fw-bold">Species:</label>
                        <input type="text" id="species" name="species" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="breed" class="form-label fw-bold">Race/Breed:</label>
                        <input type="text" id="breed" name="breed" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label fw-bold">Age (Years):</label>
                        <input type="number" id="age" name="age" step="0.1" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="color" class="form-label fw-bold">Colour:</label>
                        <input type="text" id="color" name="color" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="diagnosis" class="form-label fw-bold">Diagnosis:</label>
                        <input type="text" id="diagnosis" name="diagnosis" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="special_features" class="form-label fw-bold">Behaviour / Special Features:</label>
                        <textarea id="special_features" name="special_features" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
                        <button type="submit" class="btn btn-primary btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="/include/navbar.js"></script>
    <script src="/include/footer.js"></script>
    <script src="/js/testFetch.js"></script>
    <script type="module" src="/js/fetchForEdit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
